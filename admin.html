<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BinSalabim Admin</title>

<style>
body { font-family: Arial; background:#f4f6f9; margin:0; }
header { background:#2f80ed;color:white;padding:15px;text-align:center; }
.container { max-width:900px;margin:auto;padding:20px; }
.card { background:white;padding:20px;margin-bottom:20px;border-radius:10px; }
input { width:100%;padding:10px;margin:8px 0; }
button { background:#2f80ed;color:white;padding:10px;border:none;width:100%;cursor:pointer; }
table { width:100%;border-collapse:collapse; }
td,th { padding:8px;border-bottom:1px solid #ddd; }

#loginBox {
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
  <div class="card" style="width:300px;">
    <h2>🔐 Login Admin</h2>
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <p id="error" style="color:red;"></p>
  </div>
</div>

<!-- MAIN -->
<div id="mainContent" style="display:none;">

<header>
  BinSalabim Admin
  <button onclick="logout()" style="float:right;width:auto;">Logout</button>
</header>

<div class="container">

<div class="card">
  <h3>Tambah Lokasi</h3>
  <input id="loc_name" placeholder="Gedung_A">
  <button onclick="addLocation()">Tambah</button>
</div>

<div class="card">
  <h3>Tambah Device</h3>
  <input id="device_id" placeholder="BIN_001">
  <input id="name" placeholder="Nama">
  <input id="location_id" placeholder="Location ID">
  <button onclick="addDevice()">Tambah</button>
</div>

<div class="card">
  <h3>List Device</h3>
  <button onclick="loadDevices()">Load</button>

  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Nama</th>
        <th>Lokasi</th>
        <th>Token</th>
      </tr>
    </thead>
    <tbody id="table"></tbody>
  </table>
</div>

</div>
</div>

<script>
const API = "https://binsalabim.onrender.com";

// =====================
// INIT PAGE
// =====================
window.onload = () => {
  const token = localStorage.getItem("token");

  if (token) {
    loginBox.style.display = "none";
    mainContent.style.display = "block";
  } else {
    loginBox.style.display = "flex";
    mainContent.style.display = "none";
  }
};

// =====================
// LOGIN
// =====================
async function login() {
  const res = await fetch(API + "/login", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      username: username.value,
      password: password.value
    })
  });

  if (res.status === 200) {
    const data = await res.json();
    localStorage.setItem("token", data.token);

    location.reload();
  } else {
    error.innerText = "Login gagal!";
  }
}

// =====================
// LOGOUT
// =====================
function logout() {
  localStorage.removeItem("token");
  location.reload();
}

// =====================
// API FUNCTIONS
// =====================
async function addLocation() {
  await fetch(API + "/location", {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "x-auth":localStorage.getItem("token")
    },
    body: JSON.stringify({ name: loc_name.value })
  });

  alert("Lokasi ditambahkan");
}

async function addDevice() {
  await fetch(API + "/device", {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "x-auth":localStorage.getItem("token")
    },
    body: JSON.stringify({
      device_id: device_id.value,
      name: name.value,
      location_id: parseInt(location_id.value)
    })
  });

  alert("Device ditambahkan");
}

async function loadDevices() {
  const res = await fetch(API + "/devices", {
    headers:{
      "x-auth":localStorage.getItem("token")
    }
  });

  const data = await res.json();

  table.innerHTML = "";

  data.forEach(d => {
    table.innerHTML += `
      <tr>
        <td>${d.device_id}</td>
        <td>${d.name}</td>
        <td>${d.location_id}</td>
        <td>${d.owner_token}</td>
      </tr>
    `;
  });
}
</script>

</body>
</html>
